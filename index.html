<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⭐ Звездная Игра</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fredoka', sans-serif;
        }

        :root {
            --primary: #FF6B35;
            --secondary: #F7C548;
            --accent: #4ECDC4;
            --bg-dark: #1a1a2e;
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --card: rgba(255,255,255,0.1);
            --card-border: rgba(255,255,255,0.2);
            --text: #FFFFFF;
            --text-muted: rgba(255,255,255,0.6);
            --glow: 0 0 30px rgba(255,107,53,0.5);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            color: var(--text);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            font-size: 64px;
            margin-bottom: 20px;
            animation: float 2s ease-in-out infinite, glow 1.5s ease-in-out infinite alternate;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(255,107,53,0.8)); }
            to { filter: drop-shadow(0 0 40px rgba(255,107,53,1)); }
        }

        .loading-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .loading-bar-container {
            width: 200px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 30px;
        }

        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            animation: loading 1.5s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 0%; margin-left: 0; }
            50% { width: 60%; margin-left: 20%; }
            100% { width: 0%; margin-left: 100%; }
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            padding: 15px;
            padding-bottom: 90px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .profile-card {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            position: relative;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            box-shadow: var(--glow);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: var(--glow); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255,107,53,0.8); }
        }

        .profile-info {
            flex: 1;
        }

        .player-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .player-level {
            font-size: 14px;
            color: var(--secondary);
            font-weight: 600;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
        }

        .stat-box {
            text-align: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            min-width: 80px;
            transition: transform 0.3s ease;
        }

        .stat-box:hover {
            transform: scale(1.05);
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--secondary);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .xp-bar {
            margin-top: 15px;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            border-radius: 5px;
            transition: width 1s ease-out;
            box-shadow: 0 0 10px rgba(78,205,196,0.5);
        }

        .xp-text {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            text-align: right;
        }

        .section-card {
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 15px;
            animation: slideIn 0.5s ease-out;
            animation-fill-mode: both;
        }

        .section-card:nth-child(2) { animation-delay: 0.1s; }
        .section-card:nth-child(3) { animation-delay: 0.2s; }
        .section-card:nth-child(4) { animation-delay: 0.3s; }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title-icon {
            font-size: 22px;
        }

        .gift-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .gift-card {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .gift-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }

        .gift-card:hover::before {
            left: 100%;
        }

        .gift-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .gift-card:active {
            transform: scale(0.95);
        }

        .gift-emoji {
            font-size: 36px;
            margin-bottom: 8px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .gift-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .gift-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--secondary);
        }

        .gift-rarity {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            opacity: 0.7;
        }

        .gift-rarity.common { color: #888; }
        .gift-rarity.uncommon { color: #4CAF50; }
        .gift-rarity.rare { color: #2196F3; }
        .gift-rarity.epic { color: #9C27B0; }
        .gift-rarity.legendary { color: #FF9800; }
        .gift-rarity.mythic { color: #FF5722; }
        .gift-rarity.ultimate { color: #f44336; }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .leaderboard-item:hover {
            transform: translateX(5px);
            background: rgba(0,0,0,0.4);
        }

        .leaderboard-rank {
            font-size: 20px;
            font-weight: 700;
            width: 40px;
        }

        .leaderboard-rank.gold { color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .leaderboard-rank.silver { color: #C0C0C0; }
        .leaderboard-rank.bronze { color: #CD7F32; }

        .leaderboard-name {
            flex: 1;
            font-weight: 600;
            font-size: 15px;
        }

        .leaderboard-stars {
            font-weight: 700;
            color: var(--secondary);
        }

        .task-card {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .task-card:hover {
            transform: translateX(5px);
        }

        .task-checkbox {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .task-checkbox.completed {
            background: linear-gradient(135deg, #4ECDC4, #44a08d);
            box-shadow: 0 0 15px rgba(78,205,196,0.5);
        }

        .task-checkbox.pending {
            background: rgba(255,255,255,0.2);
        }

        .task-info {
            flex: 1;
        }

        .task-name {
            font-weight: 600;
            font-size: 14px;
        }

        .task-desc {
            font-size: 11px;
            color: var(--text-muted);
        }

        .task-reward {
            font-weight: 700;
            color: var(--secondary);
            font-size: 14px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .inventory-item {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .inventory-item:hover {
            transform: scale(1.05);
        }

        .inventory-emoji {
            font-size: 28px;
        }

        .inventory-qty {
            font-size: 12px;
            font-weight: 700;
            color: var(--secondary);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26,26,46,0.95);
            backdrop-filter: blur(10px);
            padding: 12px 10px 20px;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid var(--card-border);
            z-index: 100;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 15px;
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            color: var(--primary);
            background: rgba(255,107,53,0.15);
        }

        .nav-btn:hover {
            color: var(--text);
            transform: translateY(-3px);
        }

        .nav-icon {
            font-size: 24px;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .streak-fire {
            display: inline-block;
            animation: flicker 0.3s infinite alternate;
        }

        @keyframes flicker {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0.8; transform: scale(1.1); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        ::-webkit-scrollbar {
            width: 0;
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: linear-gradient(135deg, var(--primary), #ff8c5a);
            border: none;
            border-radius: 15px;
            color: white;
            font-family: 'Fredoka', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255,107,53,0.4);
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255,107,53,0.6);
        }

        .action-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="loading-screen">
        <div class="loading-logo">⭐</div>
        <div class="loading-title">Звездная Игра</div>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
    </div>

    <div class="app-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar">👤</div>
                <div class="profile-info">
                    <div class="player-name" id="player-name">Player</div>
                    <div class="player-level">Уровень <span id="player-level">1</span></div>
                </div>
            </div>
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-icon">⭐</div>
                    <div class="stat-value" id="stars-count">0</div>
                    <div class="stat-label">Звезд</div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-value" id="streak-count">0</div>
                    <div class="stat-label">Серия</div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">🎁</div>
                    <div class="stat-value" id="gifts-count">0</div>
                    <div class="stat-label">Подарков</div>
                </div>
            </div>
            <div class="xp-bar">
                <div class="xp-fill" id="xp-fill" style="width: 0%"></div>
            </div>
            <div class="xp-text"><span id="xp-value">0</span> / <span id="xp-needed">100</span> XP</div>
        </div>

        <div class="section-card">
            <div class="section-title">
                <span class="section-title-icon">🎁</span>
                Магазин
            </div>
            <div class="gift-grid" id="gifts-grid"></div>
            <button class="action-btn" onclick="buyGift()">Купить подарок</button>
        </div>

        <div id="leaderboard" class="tab-content">
            <div class="section-card">
                <div class="section-title">
                    <span class="section-title-icon">🏆</span>
                    Лидерборд
                </div>
                <div id="leaderboard-list"></div>
            </div>
        </div>

        <div id="tasks" class="tab-content">
            <div class="section-card">
                <div class="section-title">
                    <span class="section-title-icon">📋</span>
                    Задания
                </div>
                <div id="tasks-list"></div>
            </div>
        </div>

        <div id="inventory" class="tab-content">
            <div class="section-card">
                <div class="section-title">
                    <span class="section-title-icon">🎒</span>
                    Инвентарь
                </div>
                <div class="inventory-grid" id="inventory-list"></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="showTab('shop')">
            <span class="nav-icon">🎁</span>
            <span>Магазин</span>
        </button>
        <button class="nav-btn" onclick="showTab('leaderboard')">
            <span class="nav-icon">🏆</span>
            <span>Топ</span>
        </button>
        <button class="nav-btn" onclick="showTab('tasks')">
            <span class="nav-icon">📋</span>
            <span>Задания</span>
        </button>
        <button class="nav-btn" onclick="showTab('inventory')">
            <span class="nav-icon">🎒</span>
            <span>Инвентарь</span>
        </button>
    </nav>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let scene, camera, renderer, stars = [];
        let userData = { stars: 0, level: 1, xp: 0, daily_streak: 0, gifts_count: 0, name: 'Player' };
        let currentTab = 'shop';

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            for (let i = 0; i < 100; i++) {
                const geometry = new THREE.SphereGeometry(0.2, 8, 8);
                const material = new THREE.MeshBasicMaterial({ 
                    color: new THREE.Color().setHSL(Math.random() * 0.2 + 0.1, 1, 0.5)
                });
                const star = new THREE.Mesh(geometry, material);
                star.position.set(
                    (Math.random() - 0.5) * 60,
                    (Math.random() - 0.5) * 60,
                    (Math.random() - 0.5) * 30 - 10
                );
                scene.add(star);
                stars.push(star);
            }

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            stars.forEach((star, i) => {
                star.position.y += 0.02;
                if (star.position.y > 30) star.position.y = -30;
                star.rotation.x += 0.01;
                star.rotation.y += 0.01;
            });

            renderer.render(scene, camera);
        }

        function showTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            const targetTab = tabName === 'shop' ? 'gifts' : tabName;
            const contentEl = document.getElementById(targetTab) || document.getElementById(tabName);
            
            if (contentEl) {
                contentEl.classList.add('active');
            }
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.innerHTML.toLowerCase().includes(
                    tabName === 'shop' ? 'магазин' : 
                    tabName === 'leaderboard' ? 'топ' : 
                    tabName === 'tasks' ? 'задания' : 
                    'инвентарь'
                )) {
                    btn.classList.add('active');
                }
            });
        }

        function updateUI() {
            document.getElementById('player-name').textContent = userData.name;
            document.getElementById('player-level').textContent = userData.level;
            document.getElementById('stars-count').textContent = userData.stars;
            document.getElementById('streak-count').innerHTML = userData.daily_streak > 0 ? 
                userData.daily_streak + ' <span class="streak-fire">🔥</span>' : '0';
            document.getElementById('gifts-count').textContent = userData.gifts_count;
            
            const xpNeeded = userData.level * 100;
            const xpPercent = (userData.xp / xpNeeded) * 100;
            document.getElementById('xp-fill').style.width = xpPercent + '%';
            document.getElementById('xp-value').textContent = userData.xp;
            document.getElementById('xp-needed').textContent = xpNeeded;
        }

        function loadGifts() {
            const gifts = [
                {id: 1, name: 'Звезда', emoji: '⭐', price: 10, rarity: 'common'},
                {id: 2, name: 'Сердце', emoji: '❤️', price: 25, rarity: 'common'},
                {id: 3, name: 'Роза', emoji: '🌹', price: 50, rarity: 'uncommon'},
                {id: 4, name: 'Бриллиант', emoji: '💎', price: 100, rarity: 'rare'},
                {id: 5, name: 'Корона', emoji: '👑', price: 250, rarity: 'epic'},
                {id: 6, name: 'Ракета', emoji: '🚀', price: 500, rarity: 'legendary'},
                {id: 7, name: 'Трофей', emoji: '🏆', price: 1000, rarity: 'mythic'},
                {id: 8, name: 'НЛО', emoji: '🛸', price: 2500, rarity: 'ultimate'}
            ];

            document.getElementById('gifts-grid').innerHTML = gifts.map(gift => `
                <div class="gift-card" onclick="selectGift(${gift.id})">
                    <div class="gift-emoji">${gift.emoji}</div>
                    <div class="gift-name">${gift.name}</div>
                    <div class="gift-price">${gift.price} ⭐</div>
                    <div class="gift-rarity ${gift.rarity}">${gift.rarity}</div>
                </div>
            `).join('');
        }

        function loadLeaderboard() {
            const players = [
                {name: 'Player1', stars: 1500},
                {name: 'Player2', stars: 1200},
                {name: 'Player3', stars: 900},
                {name: 'Player4', stars: 750},
                {name: 'Player5', stars: 500}
            ];

            document.getElementById('leaderboard-list').innerHTML = players.map((p, i) => `
                <div class="leaderboard-item">
                    <div class="leaderboard-rank ${['gold','silver','bronze'][i]}">
                        ${['🥇','🥈','🥉'][i] || (i+1)+'.'}
                    </div>
                    <div class="leaderboard-name">${p.name}</div>
                    <div class="leaderboard-stars">⭐ ${p.stars}</div>
                </div>
            `).join('');
        }

        function loadTasks() {
            const tasks = [
                {name: 'Добро пожаловать', desc: 'Начни играть', reward: 50, done: true},
                {name: 'Ежедневный вход', desc: 'Заходи каждый день', reward: 10, done: false},
                {name: 'Первый подарок', desc: 'Отправь подарок', reward: 25, done: false},
                {name: 'Коллекционер', desc: 'Собери 5 подарков', reward: 75, done: false},
                {name: 'Щедрый игрок', desc: 'Отправь 10 подарков', reward: 100, done: false}
            ];

            document.getElementById('tasks-list').innerHTML = tasks.map(t => `
                <div class="task-card">
                    <div class="task-checkbox ${t.done ? 'completed' : 'pending'}">
                        ${t.done ? '✓' : '○'}
                    </div>
                    <div class="task-info">
                        <div class="task-name">${t.name}</div>
                        <div class="task-desc">${t.desc}</div>
                    </div>
                    <div class="task-reward">+${t.reward}⭐</div>
                </div>
            `).join('');
        }

        function loadInventory() {
            const items = [
                {emoji: '⭐', qty: 5},
                {emoji: '❤️', qty: 2}
            ];

            if (items.length === 0) {
                document.getElementById('inventory-list').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📦</div>
                        <p>У тебя пока нет подарков</p>
                    </div>
                `;
            } else {
                document.getElementById('inventory-list').innerHTML = items.map(item => `
                    <div class="inventory-item">
                        <div class="inventory-emoji">${item.emoji}</div>
                        <div class="inventory-qty">x${item.qty}</div>
                    </div>
                `).join('');
            }
        }

        function selectGift(id) {
            tg.HapticFeedback.impactOccurred('medium');
        }

        function buyGift() {
            tg.HapticFeedback.impactOccurred('heavy');
            tg.showAlert('Выбери подарок из магазина!');
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setTimeout(() => {
            document.getElementById('loading-screen').classList.add('hidden');
        }, 1500);

        init3D();
        updateUI();
        loadGifts();
        loadLeaderboard();
        loadTasks();
        loadInventory();
    </script>
</body>
</html>
